name: Release build

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: bash

env:
  # If you change this please also update GO_VERSION in Makefile (then run
  # `make lint` to see where else it needs to be updated as well).
  GO_VERSION: 1.25.5

jobs:
  ########################
  # Create release
  ########################
  main:
    name: Release build
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: cleanup space
        uses: ./.github/actions/cleanup-space

      - name: setup go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: '${{ env.GO_VERSION }}'
          cache: 'false'

      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: build release for all architectures
        run: SKIP_VERSION_CHECK=1 make release tag=${{ env.RELEASE_VERSION }}

      - name: Create Release
        uses: lightninglabs/gh-actions/action-gh-release@c7149b6a7818d1c39b36b69e727569897b6f2c5a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: lnd ${{ env.RELEASE_VERSION }}
          draft: true
          prerelease: false
          files: lnd-${{ env.RELEASE_VERSION }}/*
          body: |
            # Database Migrations
            TODO

            # Verifying the Release

            Each release ships a `manifest-${{ env.RELEASE_VERSION }}.txt` file containing the SHA-256 of every archive and binary. After downloading, recompute the hash of your archive with `shasum -a 256 <filename>` and confirm it matches the corresponding line in the manifest *exactly*.

            ## Reproducible Builds

            Release binaries are fully reproducible. Third parties can rebuild from source and verify byte-for-byte equality without trusting the release manager. The binaries are compiled with `go${{ env.GO_VERSION }}`, which verifiers must use to arrive at the same output. They include the following build tags: `autopilotrpc`, `signrpc`, `walletrpc`, `chainrpc`, `invoicesrpc`, `neutrinorpc`, `routerrpc`, `watchtowerrpc`, `monitoring`, `peersrpc`, `kvdb_postgres`, `kvdb_etcd`, and `kvdb_sqlite`. These are already included in the release script, so they do not need to be provided.

            The `make release` command rebuilds with the same flags used for the release. To build for a single platform: `make release sys=<OS-ARCH> tag=<tag>`.

            # Building the Contained Release

            Users are able to rebuild the target release themselves without having to fetch any of the dependencies. In order to do so, assuming
            that `vendor.tar.gz` and `lnd-source-${{ env.RELEASE_VERSION }}.tar.gz` are in the current directory, follow these steps:

            ```
            tar -xvzf lnd-source-${{ env.RELEASE_VERSION }}.tar.gz
            mv vendor.tar.gz lnd-source/
            cd lnd-source
            tar -xvzf vendor.tar.gz
            go install -v -mod=vendor -ldflags "-X github.com/lightningnetwork/lnd/build.Commit=${{ env.RELEASE_VERSION }}" ./cmd/lnd
            go install -v -mod=vendor -ldflags "-X github.com/lightningnetwork/lnd/build.Commit=${{ env.RELEASE_VERSION }}" ./cmd/lncli
            ```

            The `-mod=vendor` flag tells the `go build` command that it doesn't need to fetch the dependencies, and instead, they're all enclosed in the local vendor directory. 

            Additionally, it's now possible to use the [enclosed `release.sh` script](https://github.com/loka-network/loka-p2p-lnd/blob/master/scripts/release.sh) to bundle a release for a _specific_ system like so:

            ```
            make release sys="linux-arm64 darwin-amd64"
            ```

